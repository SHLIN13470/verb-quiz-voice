<html lang="zh-TW">
<head>

<title>動詞三態測驗</title>
<style>

  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: #fff; border-bottom: 1px solid #e4e0d8;

  }
  .topbar-row { display: flex; justify-content: space-between; align-items: center; }
  .topbar-title { font-size: 15px; font-weight: 600; color: #111; }
  .counter { font-size: 13px; color: #888; }
  .progress-wrap { background: #edeae4; border-radius: 99px; height: 4px; }
  .progress-fill { background: #1D9E75; height: 4px; border-radius: 99px; transition: width 0.4s; }
  .stats-row { display: flex; gap: 8px; padding: 10px 16px; }
  .stat-chip { flex: 1; background: #fff; border-radius: 10px; padding: 8px 0; text-align: center; border: 1px solid #e4e0d8; }

  .stat-num.w { color: #e24b4a; }
  .stat-num.r { color: #888; }
  .stat-label { font-size: 11px; color: #aaa; margin-top: 2px; }
  .main { flex: 1; padding: 12px 16px 160px; }
  .verb-pill {
    display: inline-block; background: #e8f4ff; color: #185FA5;

    background: #fff; border-radius: 16px; padding: 20px;

  .sentence b { color: #185FA5; font-weight: 700; }

  .play-btn {

    background: #1D9E75; color: #fff; font-size: 30px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(29,158,117,0.3); transition: background 0.15s, transform 0.1s;
  }
  .play-btn:active { transform: scale(0.93); }
  .play-btn.playing { background: #185FA5; }
  .speed-row { display: flex; gap: 8px; }
  .speed-chip {
    padding: 5px 13px; border-radius: 99px; border: 1px solid #ddd;

  }
  .speed-chip.active { background: #e8f4ff; color: #185FA5; border-color: #b5d4f4; }
  .sentence-reveal {

    font-size: 15px; line-height: 1.7; color: #555; margin-bottom: 14px;
  }
  .sentence-reveal b { color: #185FA5; font-weight: 700; }

  .feedback-bar.wrong { background: #fdecea; color: #a32d2d; }

    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff; border-top: 1px solid #e4e0d8;
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));

  .answer-input {
    flex: 1; height: 48px; border: 1.5px solid #ddd; border-radius: 12px;
    padding: 0 16px; font-size: 16px; color: #111; background: #f9f8f5;

  .btn-full.red { background: #e24b4a; color: #fff; display: none; }

  .wrong-item { background: #fff; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid #e4e0d8; }

</head>
<body>

<div id="quiz-section">
  <div class="topbar">
    <div class="topbar-row">
      <span class="topbar-title" id="mode-label">動詞三態測驗</span>
      <span class="counter" id="q-counter">1 / 100</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="prog" style="width:0%"></div>
    </div>
    <div class="mode-selector">
      <button class="mode-btn active" id="btn-mode-read" onclick="switchMode('read')">📖 閱讀填空</button>
      <button class="mode-btn" id="btn-mode-listen" onclick="switchMode('listen')">🔊 聽打練習</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-chip"><div class="stat-num c" id="sc">0</div><div class="stat-label">答對</div></div>
    <div class="stat-chip"><div class="stat-num w" id="sw">0</div><div class="stat-label">答錯</div></div>
    <div class="stat-chip"><div class="stat-num r" id="sr">100</div><div class="stat-label">剩餘</div></div>
  </div>

  <div class="main">
    <!-- Verb chip: shown in read mode, hidden in listen mode -->
    <div id="verb-chip-wrap"><span class="verb-pill" id="verb-chip"></span></div>

    <!-- Read mode -->
    <div id="read-ui">
      <div class="sentence-card">
        <div class="sentence" id="sentence"></div>
      </div>
    </div>

    <!-- Listen mode -->
    <div id="listen-ui" class="hidden">
      <div class="listen-card">
        <div class="play-hint">聽完整個句子<br>填入正確的動詞形態</div>
        <button class="play-btn" id="play-btn" onclick="playSentence()">▶</button>
        <div class="speed-row">
          <button class="speed-chip active" onclick="setSpeed(0.75, this)">慢速 0.75x</button>
          <button class="speed-chip" onclick="setSpeed(1, this)">正常 1x</button>
          <button class="speed-chip" onclick="setSpeed(1.25, this)">快速 1.25x</button>
        </div>
      </div>
    </div>

    <div id="feedback-wrap"></div>

    <!-- Full sentence revealed after answering in listen mode -->
    <div id="sentence-reveal" class="sentence-reveal hidden"></div>

    <div id="tense-wrap" class="hidden">
      <div class="tense-card">
        <table class="tense-table">
          <tr><th>原形</th><th>過去式</th><th>過去分詞</th></tr>
          <tr><td id="t-base"></td><td id="t-past" class="hl"></td><td id="t-pp" class="hl"></td></tr>
        </table>
      </div>
    </div>
  </div>

  <div class="action-bar">
    <div class="input-row">
      <input type="text" id="ans-input" class="answer-input" placeholder="輸入答案..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <button class="btn-confirm" id="btn-check" onclick="checkAnswer()">確認</button>
    </div>
    <div class="bottom-row">
      <button class="btn-next" id="btn-next" onclick="nextQ()" disabled>下一題 →</button>
      <button class="btn-secondary" onclick="skipQ()">跳過</button>
      <button class="btn-secondary" onclick="toggleTable()">三態表</button>
    </div>
  </div>
</div>

<div id="result-section">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-score" id="final-score"></div>
  <div class="result-sub" id="final-sub"></div>
  <div class="result-btns">
    <button class="btn-full green" onclick="restartAll()">重新全部練習</button>
    <button class="btn-full red" id="btn-retry" onclick="retryWrong()"></button>
  </div>
  <div class="wrong-section" id="wrong-section" style="display:none;">
    <div class="wrong-section-title">答錯的題目</div>
    <div id="wrong-items"></div>
  </div>
</div>

  {v:"compel",s:"Consumers are often [B] to purchase unnecessary items by aggressive advertising.",past:"compelled",pp:"compelled",need:"pp"},
  {v:"constitute",s:"The sudden demographic shift [B] a major challenge for the healthcare system last year.",past:"constituted",pp:"constituted",need:"past"},
  {v:"deplete",s:"Our natural groundwater reserves have been severely [B] due to over-extraction.",past:"depleted",pp:"depleted",need:"pp"},
  {v:"disrupt",s:"Global supply chains were heavily [B] by the unprecedented pandemic.",past:"disrupted",pp:"disrupted",need:"pp"},
  {v:"embrace",s:"Remote working arrangements have been widely [B] by both employers and employees globally.",past:"embraced",pp:"embraced",need:"pp"},
  {v:"evolve",s:"Over millions of years, human societies have [B] from hunter-gatherer groups to complex civilizations.",past:"evolved",pp:"evolved",need:"pp"},
  {v:"mitigate",s:"The devastating effects of the drought could have been [B] if early warnings were heeded.",past:"mitigated",pp:"mitigated",need:"pp"},
  {v:"perceive",s:"Vocational education is often incorrectly [B] as inferior to a traditional university degree.",past:"perceived",pp:"perceived",need:"pp"},
  {v:"retain",s:"In a competitive market, it is crucial that highly skilled employees are [B].",past:"retained",pp:"retained",need:"pp"},
  {v:"trigger",s:"The central bank's decision to raise interest rates immediately [B] a decline in consumer spending.",past:"triggered",pp:"triggered",need:"past"},
];

let queue=[],wrongList=[],correct=0,wrong=0,answered=0,checked=false,isRetry=false,tableVisible=false;
let currentMode='read';
let speechRate=0.75;
let currentUtterance=null;

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getCorrect(q){return q.need==='pp'?q.pp:q.past;}

function switchMode(mode){
  currentMode=mode;
  document.getElementById('btn-mode-read').classList.toggle('active',mode==='read');
  document.getElementById('btn-mode-listen').classList.toggle('active',mode==='listen');
  document.getElementById('read-ui').classList.toggle('hidden',mode==='listen');
  document.getElementById('listen-ui').classList.toggle('hidden',mode==='read');
  document.getElementById('sentence-reveal').classList.add('hidden');
  document.getElementById('verb-chip-wrap').classList.toggle('hidden',mode==='listen');
  if(currentUtterance){window.speechSynthesis.cancel();}
  const btn=document.getElementById('play-btn');
  if(btn){btn.textContent='▶';btn.classList.remove('playing');}
}

function setSpeed(rate,el){
  speechRate=rate;
  document.querySelectorAll('.speed-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}

function playSentence(){
  if(!window.speechSynthesis){alert('您的瀏覽器不支援語音合成，請改用 Chrome 或 Safari。');return;}
  if(currentUtterance){window.speechSynthesis.cancel();}
  const q=queue[0];
  const text=q.s.replace('[B]',getCorrect(q));
  const utter=new SpeechSynthesisUtterance(text);
  utter.lang='en-GB';
  utter.rate=speechRate;
  currentUtterance=utter;
  const btn=document.getElementById('play-btn');
  btn.textContent='⏸';btn.classList.add('playing');
  utter.onend=()=>{btn.textContent='▶';btn.classList.remove('playing');currentUtterance=null;};
  utter.onerror=()=>{btn.textContent='▶';btn.classList.remove('playing');currentUtterance=null;};
  window.speechSynthesis.speak(utter);
}

function init(qs,retry){
  queue=[...qs];wrongList=[];correct=0;wrong=0;answered=0;isRetry=retry;
  document.getElementById('sc').textContent=0;
  document.getElementById('sw').textContent=0;
  document.getElementById('sr').textContent=queue.length;
  document.getElementById('mode-label').textContent=retry?'錯題重練':'動詞三態測驗';
  document.getElementById('result-section').classList.remove('show');
  document.getElementById('result-section').style.display='none';
  document.getElementById('quiz-section').style.display='block';
  showQ();
}

function showQ(){
  if(!queue.length){showResult();return;}
  const q=queue[0];
  checked=false;tableVisible=false;
  if(currentUtterance){window.speechSynthesis.cancel();}
  document.getElementById('tense-wrap').classList.add('hidden');
  document.getElementById('sentence-reveal').classList.add('hidden');
  document.getElementById('feedback-wrap').innerHTML='';
  const inp=document.getElementById('ans-input');
  inp.value='';inp.className='answer-input';inp.disabled=false;
  document.getElementById('btn-check').disabled=false;
  document.getElementById('btn-next').disabled=true;
  const total=isRetry?(wrongList.length+queue.length):ALL_Q.length;
  const done=isRetry?wrongList.length:(ALL_Q.length-queue.length);
  document.getElementById('q-counter').textContent=`${done+1} / ${total}`;
  document.getElementById('prog').style.width=(total?Math.round((done/total)*100):0)+'%';
  document.getElementById('verb-chip').textContent=q.v;
  document.getElementById('sentence').innerHTML=q.s.replace('[B]','<b>______</b>');
  document.getElementById('t-base').textContent=q.v;
  document.getElementById('t-past').textContent=q.past;
  document.getElementById('t-pp').textContent=q.pp;
  document.getElementById('verb-chip-wrap').classList.toggle('hidden',currentMode==='listen');
  const btn=document.getElementById('play-btn');
  if(btn){btn.textContent='▶';btn.classList.remove('playing');}
  setTimeout(()=>inp.focus(),100);
}

function checkAnswer(){
  if(checked)return;
  const q=queue[0];
  const inp=document.getElementById('ans-input');
  const userAns=inp.value.trim().toLowerCase();
  const alts=getCorrect(q).toLowerCase().split('/').map(x=>x.trim());
  const isOk=alts.includes(userAns);
  checked=true;inp.disabled=true;
  document.getElementById('btn-check').disabled=true;
  document.getElementById('btn-next').disabled=false;
  const fw=document.getElementById('feedback-wrap');
  if(isOk){
    inp.className='answer-input correct';
    fw.innerHTML=`<div class="feedback-bar correct"><span>✓ 正確！答案是「${getCorrect(q)}」</span></div>`;
    correct++;document.getElementById('sc').textContent=correct;
    queue.shift();
  } else {
    inp.className='answer-input wrong';
    fw.innerHTML=`<div class="feedback-bar wrong"><span>✗ 答錯了，正確答案是「${getCorrect(q)}」</span></div>`;
    wrong++;document.getElementById('sw').textContent=wrong;
    wrongList.push(q);queue.shift();
  }
  answered++;document.getElementById('sr').textContent=queue.length;
  document.getElementById('tense-wrap').classList.remove('hidden');
  tableVisible=true;
  if(currentMode==='listen'){
    const rev=document.getElementById('sentence-reveal');
    rev.classList.remove('hidden');
    rev.innerHTML='<b style="color:#185FA5;">'+q.v+'</b> &nbsp;―&nbsp; '+q.s.replace('[B]','<b>'+getCorrect(q)+'</b>');
  }
}

function nextQ(){showQ();}

function skipQ(){
  if(checked){showQ();return;}
  if(currentUtterance){window.speechSynthesis.cancel();}
  const q=queue.shift();queue.push(q);showQ();
}

function toggleTable(){
  tableVisible=!tableVisible;
  document.getElementById('tense-wrap').classList.toggle('hidden',!tableVisible);
}

function showResult(){
  if(currentUtterance){window.speechSynthesis.cancel();}
  document.getElementById('quiz-section').style.display='none';
  const rs=document.getElementById('result-section');
  rs.style.display='flex';rs.classList.add('show');
  const pct=answered?Math.round(correct/answered*100):0;
  document.getElementById('result-emoji').textContent=pct===100?'🏆':pct>=80?'🎉':pct>=60?'💪':'📚';
  document.getElementById('final-score').textContent=correct+' / '+answered;
  document.getElementById('final-sub').textContent=
    pct===100?'全對！完美表現！':
    pct>=80?`答對率 ${pct}%，表現優秀！`:
    pct>=60?`答對率 ${pct}%，繼續加油！`:
    `答對率 ${pct}%，建議多加練習！`;
  const btn=document.getElementById('btn-retry');
  if(wrongList.length){
    btn.style.display='block';
    btn.textContent=`錯題重練（${wrongList.length} 題）`;
    showWrongList();
  } else {
    btn.style.display='none';
    document.getElementById('wrong-section').style.display='none';
  }
}

function showWrongList(){
  document.getElementById('wrong-section').style.display='block';
  document.getElementById('wrong-items').innerHTML=wrongList.map(q=>`
    <div class="wrong-item">
      <div class="wrong-verb">${q.v}</div>
      <div class="wrong-ans">${getCorrect(q)}</div>
      <div class="wrong-full">${q.v} / ${q.past} / ${q.pp}</div>
    </div>
  `).join('');
}

function restartAll(){init(shuffle([...ALL_Q]),false);}
function retryWrong(){if(wrongList.length){init(shuffle([...wrongList]),true);}}

document.getElementById('ans-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'){if(!checked)checkAnswer();else nextQ();}
});

init(shuffle([...ALL_Q]),false);
</script>
</body>
</html>
